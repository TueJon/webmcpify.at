# Include from the webmcpify.at server block after defining the maps/log_format
# below in http {}. This is review-ready configuration, not deployed state.

# http {} context:
# geo $webmcpify_internal {
#   default 0;
#   127.0.0.0/8 1;
#   ::1 1;
#   # Add stable office/VPN CIDRs here. The address is used transiently by nginx
#   # for exclusion and is never written to this event log.
# }
# map $webmcpify_internal $webmcpify_log_event { 0 1; 1 0; }
# log_format webmcpify_event '$time_iso8601 $request_method $uri $status';

location ~ ^/__measure/(install-command-copy|github-outbound)/(direct|other|show-hn|chrome-group|console|changelog|linkedin|reddit|google-cpc)$ {
    limit_except POST { deny all; }
    access_log /var/log/nginx/webmcpify-events.log webmcpify_event if=$webmcpify_log_event;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    return 204;
}

# Recommended for the ordinary site access log: use $uri rather than $request
# or $request_uri so arbitrary campaign query strings are not retained there.
